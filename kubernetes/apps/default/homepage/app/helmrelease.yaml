apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  interval: 1h
  chart:
    spec:
      chart: homepage
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: homepage
  values:
    serviceAccount:
      create: true
      name: homepage
    enableRbac: true
    config:
      kubernetes:
        mode: cluster
      settings:
        title: "Carbon Lattice Homelab"
        theme: dark
        color: slate
        useEqualHeights: true
      widgets:
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "homelab"
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true
        - datetime:
            text_size: xl
            format:
              timeStyle: short
              dateStyle: short
      services:
        - Cluster:
            - Flux:
                icon: flux-cd.png
                description: GitOps
                href: "https://github.com/CarbonLattice/homelab"
      bookmarks: []