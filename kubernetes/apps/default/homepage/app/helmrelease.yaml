apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  chartRef:
    kind: OCIRepository
    name: homepage
  interval: 1h
  values:
    serviceAccount:
      create: true
      name: homepage
    enableRbac: true
    config:
      kubernetes:
        mode: cluster
      settings:
        title: "Carbon Lattice Homelab"
        theme: dark
        color: slate
        useEqualHeights: true
        layout:
          Cluster:
            style: row
            columns: 3
      widgets:
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "homelab"
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true
        - datetime:
            text_size: xl
            format:
              timeStyle: short
              dateStyle: short
      services:
        - Cluster:
            - Flux:
                icon: flux-cd.png
                description: GitOps
                href: "https://github.com/CarbonLattice/homelab"
      bookmarks: []
    route:
      app:
        hostnames: ["homepage.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https