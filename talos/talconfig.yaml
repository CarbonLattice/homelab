---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.1.10.240:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.1.10.240"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "node1"
    ipAddress: "10.1.10.231"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/039535a70c3bd1667c355eca78571267704e55c8a24785033d183b8f26e39d82
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:23:24:cb:b5:69"
        dhcp: false
        addresses:
          - "10.1.10.231/24"
        routes:
          - gateway: "10.1.10.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.1.10.240"
  - hostname: "node2"
    ipAddress: "10.1.10.232"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/039535a70c3bd1667c355eca78571267704e55c8a24785033d183b8f26e39d82
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e4:54:e8:6e:de:08"
        dhcp: false
        addresses:
          - "10.1.10.232/24"
        routes:
          - gateway: "10.1.10.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.1.10.240"
  - hostname: "node3"
    ipAddress: "10.1.10.233"
    installDisk: "/dev/nvme0n1"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/039535a70c3bd1667c355eca78571267704e55c8a24785033d183b8f26e39d82
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "e4:54:e8:6f:2c:cd"
        dhcp: false
        addresses:
          - "10.1.10.233/24"
        routes:
          - gateway: "10.1.10.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.1.10.240"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

